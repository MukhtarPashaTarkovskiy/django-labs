{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Django Public Blog - вход</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="auth-page">
  <div class="content">
    <h1>Вход</h1>
    <form method="POST">{% csrf_token %}
      <input type="text" name="username" placeholder="Логин" value="{{ form.username }}">
      <input type="password" name="password" placeholder="Пароль">
      <input type="submit" value="Войти">
    </form>
    <div class="errors">{{ form.errors }}</div>
    <a class="small-link" href="/register/">Регистрация</a>
  </div>
</body>
</html>
