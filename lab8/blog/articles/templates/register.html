{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Django Public Blog - регистрация</title>
  <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>
<body class="register-page">
  <div class="content">
    <h1>Регистрация</h1>
    <form method="POST">{% csrf_token %}
      <input type="text" name="username" placeholder="Имя пользователя" value="{{ form.username }}">
      <input type="text" name="email" placeholder="Email" value="{{ form.email }}">
      <input type="password" name="password" placeholder="Пароль">
      <input type="submit" value="Зарегистрироваться">
    </form>
    <div class="errors">{{ form.errors }}</div>
    <a class="small-link" href="/login/">Уже есть аккаунт? Войти</a>
  </div>
</body>
</html>
