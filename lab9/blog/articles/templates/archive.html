{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Архив всех статей</title>
  <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>

<body class="archive-page">

  <div class="page">

    <div class="header">
      <img class="logo" src="{% static 'img/dpb-logo.png' %}" alt="Django public blog" />

      <!-- <div class="header-text-area">
        <p class="service-title">Коллективный блог</p>
        <a href="{% url 'register' %}" class="register-link">Регистрация</a>
        <a href="{% url 'login' %}" class="register-link">Вход</a>
      </div> -->

      <div class="header-text-area">
  <p class="service-title">Коллективный блог</p>

  <a href="{% url 'register' %}" class="register-link">Регистрация</a>
  <a href="{% url 'login' %}" class="register-link">Вход</a>

  {% if not request.user.is_anonymous %}
    <a href="{% url 'create_post' %}" class="register-link">Создать статью</a>
    <a href="{% url 'logout' %}" class="register-link">Выход</a>
  {% endif %}
</div>

      <div class="icons-for-parallax">
        <img class="icon-for-parallax-first" src="{% static 'img/article-icon-for-parallax.png' %}">
        <img class="icon-for-parallax-second" src="{% static 'img/article-icon-for-parallax.png' %}">
        <img class="icon-for-parallax-third" src="{% static 'img/article-icon-for-parallax.png' %}">
      </div>

      <div class="clearfix"></div>
    </div>

    <div class="archive">
      {% for post in posts %}
        <div class="one-post">
          <h2 class="post-title">
            <a href="{% url 'get_article' article_id=post.id %}">{{ post.title }}</a>
          </h2>

          <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
          </div>

          <p class="article-text">{{ post.get_excerpt }}</p>

          <button class="fold-button">свернуть</button>

          <div class="one-post-shadow"></div>
        </div>
      {% endfor %}
    </div>

  </div>

  <script src="{% static 'js/jquery.js' %}"></script>
  <script src="{% static 'js/helloworld.js' %}"></script>
  <script src="{% static 'js/fold-post.js' %}"></script>
  <script src="{% static 'js/highlight-post.js' %}"></script>
  <script src="{% static 'js/parallax.js' %}"></script>

</body>
</html>
